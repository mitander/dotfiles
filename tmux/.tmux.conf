# settings
set -g status-interval 1
set-option -g default-command fish
set-option -g default-terminal 'screen-256color'
set -ga terminal-overrides ',*256col*:Tc'
set-option -g focus-events on
set-option -sg escape-time 10
set-option -g history-limit 5000
set-option -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on
set -g base-index 1

# reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# vim keys
setw -g mode-keys vi
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-q' if-shell "$is_vim" 'send-keys C-w q' 'kill-pane'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# search in pane
bind C-f copy-mode \; command-prompt -p "(search up)" "send -X search-backward \"%%%\""

# tmux-yank
set -g set-clipboard external
set -g @yank_action 'copy-pipe-and-cancel'
set -g @yank_selection_mouse 'clipboard'
set -g @shell_mode 'vi'

# copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# project workspace
bind-key e run-shell -b "~/dotfiles/scripts/tmux-project.sh vim \"#{pane_current_path}\""
bind-key s split-window -v -c "#{pane_current_path}"
bind-key a run-shell -b "~/dotfiles/scripts/tmux-project.sh agent \"#{pane_current_path}\""
bind-key P run-shell -b "~/dotfiles/scripts/tmux-project.sh agent \"#{pane_current_path}\""
bind-key A run-shell -b "~/dotfiles/scripts/tmux-project.sh agent-split \"#{pane_current_path}\""
bind-key g run-shell -b "~/dotfiles/scripts/tmux-project.sh git \"#{pane_current_path}\""
bind-key Enter display-popup -E -d "#{pane_current_path}" -w 90% -h 80%

# project shells
bind-key c run-shell -b "~/dotfiles/scripts/tmux-project.sh shell \"#{pane_current_path}\""
bind-key C-c run-shell -b "~/dotfiles/scripts/tmux-project.sh shell2 \"#{pane_current_path}\""

# splits
bind-key v split-window -h -c "#{pane_current_path}"
bind-key S split-window -v -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

bind-key -r C-h previous-window
bind-key -r C-l next-window
bind-key C-a last-window
bind-key q kill-window

bind-key h switch-client -p
bind-key l switch-client -n
bind-key Space switch-client -l
bind-key w run-shell -b "~/dotfiles/scripts/tmux-session.sh switch"

bind-key f resize-pane -Z
bind-key z run-shell "tmux setenv zoomed $(tmux display -p '#{window_zoomed_flag}')"\; \
         last-pane\; \
         run-shell "test $(tmux display -p '#{zoomed}') -ne 0 || tmux resize-pane -Z"

# colors & styles (dynamically loaded from ghostty flume theme)
run-shell "~/dotfiles/themes/flume/tmux/apply.sh"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir "$XDG_DATA_HOME/tmux/resurrect"
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'

# pi support
set -g extended-keys on
set -g extended-keys-format csi-u
