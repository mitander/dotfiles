# Workspace-aware status bar with quiet pane borders.
# Depends on colors from flume-theme.conf.

run-shell -b "~/dotfiles/scripts/tmux-project.sh __refresh-status"

# status
set -g status "on"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style bg=$thm_bg,fg=$thm_fg
# Explicitly reset the single-line status format after prior experiments.
# Use #{E:...} so option values are expanded before rendering.
set -g status-format[0] "#[align=left range=left]#{E:status-left}#[norange]#[align=absolute-centre]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right range=right]#{E:status-right}#[norange]"
set -g status-left "#[bold]#[fg=$thm_bg]#[bg=$thm_accent] #{?@workspace_name,#{@workspace_name},#S} #[default] "
bind-key -n MouseDown1StatusLeft run-shell -b "~/dotfiles/scripts/tmux-session.sh switch"
set -g status-right "#{?window_zoomed_flag,#[bold]#[fg=$thm_bg]#[bg=$thm_yellow] 󰊓 zoom #[default],}"
set -g window-status-separator " "
set -g window-status-current-format "#[range=window|#{window_index}]#[bold]#[fg=$thm_bg]#[bg=#{?@workspace_mode_color,#{@workspace_mode_color},$thm_accent}] #{?@workspace_mode_label,#{@workspace_mode_label},#W} #[norange default]"
set -g window-status-format "#[range=window|#{window_index}]#[fg=$thm_lgray]#[bg=$thm_bg] #{?@workspace_mode_label,#{@workspace_mode_label},#W} #[norange default]"

# Pane borders: single-pane windows keep a hidden bg-colored bottom border for
# padding; split windows show the active pane border in gray and hide inactive
# pane borders against the bg.
set -g pane-border-style fg=$thm_bg,bg=$thm_bg
set -g pane-active-border-style "fg=#{?#{==:#{window_panes},1},$thm_bg,$thm_gray},bg=$thm_bg"
set -g pane-border-indicators off
set -g pane-border-lines single
set -g pane-border-status bottom
set -g pane-border-format "#{?#{==:#{window_panes},1},#[fg=$thm_bg]#[bg=$thm_bg]#{R: ,#{pane_width}},#{?pane_active,#[fg=$thm_gray]#[bg=$thm_bg]#{R:─,#{pane_width}},#[fg=$thm_bg]#[bg=$thm_bg]#{R: ,#{pane_width}}}}#[default]"
set-hook -g after-new-window[99] 'set -w pane-border-status bottom'
set-hook -g after-split-window[99] 'set -w pane-border-status bottom'
set-hook -g after-kill-pane[99] 'set -w pane-border-status bottom'
set-hook -g pane-exited[99] 'set -w pane-border-status bottom'
set-hook -g window-layout-changed[99] 'set -w pane-border-status bottom'
run-shell -b 'tmux -S "#{socket_path}" list-windows -a -F "##{window_id}" | while read -r win; do tmux -S "#{socket_path}" set -w -t "$win" pane-border-status bottom; done'
