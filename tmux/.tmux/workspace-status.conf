# Workspace-aware status bar with quiet pane borders.
# Depends on colors from flume-theme.conf.

run-shell -b "~/dotfiles/scripts/tmux-project.sh __refresh-status"

# status
set -g status "on"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style bg=$thm_bg,fg=$thm_fg
# Explicitly reset the single-line status format after prior experiments.
# Use #{E:...} so option values are expanded before rendering.
set -g status-format[0] "#[align=left]#{E:status-left}#[align=absolute-centre]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{E:status-right}"
set -g status-left "#[bold]#[fg=$thm_bg,bg=$thm_blue] #{?@workspace_name,#{@workspace_name},#S} #[default] "
set -g status-right "#{?window_zoomed_flag,#[bold]#[fg=$thm_bg,bg=$thm_yellow] ó°Š“ #[default],}"
set -g window-status-separator " "
set -g window-status-current-format "#[bold]#[fg=$thm_bg,bg=#{?@workspace_mode_color,#{@workspace_mode_color},$thm_blue}] #{?@workspace_mode_label,#{@workspace_mode_label},#W} #[default]"
set -g window-status-format "#[fg=$thm_lgray,bg=$thm_bg] #{?@workspace_mode_label,#{@workspace_mode_label},#W} #[default]"

# Pane borders: no border for single-pane windows; in split windows, show the
# active pane border in gray and hide inactive pane borders against the bg.
set -g pane-border-style fg=$thm_bg,bg=$thm_bg
set -g pane-active-border-style fg=$thm_gray,bg=$thm_bg
set -g pane-border-indicators off
set -g pane-border-lines single
set -g pane-border-status off
set -g pane-border-format "#{?pane_active,#[fg=$thm_gray,bg=$thm_bg]#{R:â”€,#{pane_width}},#[fg=$thm_bg,bg=$thm_bg]#{R: ,#{pane_width}}}#[default]"
set-hook -g after-new-window[99] 'if -F "#{>:#{window_panes},1}" "set -w pane-border-status bottom" "set -w pane-border-status off"'
set-hook -g after-split-window[99] 'if -F "#{>:#{window_panes},1}" "set -w pane-border-status bottom" "set -w pane-border-status off"'
set-hook -g after-kill-pane[99] 'if -F "#{>:#{window_panes},1}" "set -w pane-border-status bottom" "set -w pane-border-status off"'
set-hook -g pane-exited[99] 'if -F "#{>:#{window_panes},1}" "set -w pane-border-status bottom" "set -w pane-border-status off"'
set-hook -g window-layout-changed[99] 'if -F "#{>:#{window_panes},1}" "set -w pane-border-status bottom" "set -w pane-border-status off"'
run-shell -b 'tmux -S "#{socket_path}" list-windows -a -F "##{window_id} ##{window_panes}" | while read -r win panes; do if [ "$panes" -gt 1 ]; then tmux -S "#{socket_path}" set -w -t "$win" pane-border-status bottom; else tmux -S "#{socket_path}" set -w -t "$win" pane-border-status off; fi; done'
